name: run-remote-command

on:
  repository_dispatch:
    types: [run-command]

permissions:
  contents: read

concurrency:
  group: run-remote-command
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run command safely and report back to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          CMD_B64: ${{ github.event.client_payload.command_b64 }}
        run: |
          set +e

          # 1. Validate inputs
          if [ -z "$CMD_B64" ] || [ -z "$CHAT_ID" ]; then
            echo "Error: Missing command payload or Chat ID."
            exit 1
          fi

          # 2. Decode safely without losing newlines/interpreting backslashes
          CMD="$(printf '%s' "$CMD_B64" | base64 -d)"
          export CMD
          echo "Running (sanitized log): [redacted length ${#CMD}]"

          # 3. Execute safely using single-quoted env variable to prevent quote expansion bugs
          OUTPUT="$(timeout 60s bash -c '$CMD' 2>&1)"
          STATUS=$?

          # 4. Safely truncate using lines instead of raw bytes to protect UTF-8 compliance
          TRUNCATED="$(echo "$OUTPUT" | tail -n 50)"
          MSG="Exit code: ${STATUS}
          
          ${TRUNCATED}"

          # 5. Send to Telegram with retries
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=${MSG}")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Telegram notification sent successfully."
              break
            fi
            
            echo "sendMessage attempt $attempt failed (HTTP $HTTP_CODE), retrying..."
            sleep 2
          done
