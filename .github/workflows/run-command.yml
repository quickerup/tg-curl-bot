
name: Run remote command
on:
  repository_dispatch:
    types: [run-command]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run command safely and report back to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Correctly mapping from client_payload
          CMD_B64: ${{ github.event.client_payload.command_b64 }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          set +e
          if [ -z "$CMD_B64" ] || [ -z "$CHAT_ID" ]; then
            echo "Error: Missing command payload or Chat ID."
            exit 1
          fi

          CMD="$(printf '%s' "$CMD_B64" | base64 -d)"
          echo "Executing command..."
          
          OUTPUT="$(timeout 60s bash -c "$CMD" 2>&1)"
          STATUS=$?
          
          # Truncate output for Telegram
          TRUNCATED="$(echo "$OUTPUT" | tail -n 50)"
          MSG="Exit code: ${STATUS}

${TRUNCATED}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"             --data-urlencode "chat_id=${CHAT_ID}"             --data-urlencode "text=${MSG}"
