name: Run remote command
on:
  repository_dispatch:
    types: [run-command]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run command and report back to Telegram (Run ID ${{ github.run_id }})
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CMD_B64: ${{ github.event.client_payload.command_b64 }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          set +e
          if [ -z "$CMD_B64" ] || [ -z "$CHAT_ID" ]; then
            echo "Error [Run ID ${{ github.run_id }}]: Missing command payload or Chat ID."
            exit 1
          fi

          CMD="$(printf '%s' "$CMD_B64" | base64 -d)"
          export CMD
          echo "Running (sanitized log) [Run ID ${{ github.run_id }}]: [redacted length ${#CMD}]"

          # Use 'eval "$CMD"' with single-quoted CMD env variable to preserve literal quotes
          OUTPUT="$(timeout 60s bash -c 'eval "$CMD"' 2>&1)"
          
          # Truncate to fit Telegram limits (approx 4000 chars)
          TRUNCATED="$(echo "$OUTPUT" | tail -c 4000)"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TRUNCATED}"